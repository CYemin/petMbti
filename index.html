<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物 MBTI | 在线测试你家毛孩子的人格类型</title>
    <meta
      name="description"
      content="上传毛孩子照片并完成宠物 MBTI 测试，获得宠物人格结果、海报风结果页和主人陪伴建议。"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <main>
        <section class="hero hero-form">
          <div class="container narrow hero-form-wrap">
            <div class="quiz-shell" id="quiz-app" data-quiz-root>
              <section class="landing-cover" data-landing-cover>
                <span class="landing-eyebrow">宠物 MBTI</span>
                <h1 class="landing-title">测测你家毛孩子是什么 MBTI。</h1>
                <button class="button button-primary button-large landing-button" type="button" data-start-quiz>
                  开始测试
                </button>
              </section>

              <form class="wizard-card panel-card is-visible" data-quiz-form novalidate hidden>
                <div class="intro-heading">
                  <span class="eyebrow">宠物 MBTI</span>
                  <h1>先填毛孩子信息，再开始测试。</h1>
                  <p class="hero-text">照片可以不上传，直接填写名字和类型后继续答题。</p>
                </div>

                <div class="upload-stack" data-basic-media>
                  <label class="upload-label" for="pet-photo-input">选择毛孩子照片（可选）</label>
                  <input
                    class="sr-only"
                    id="pet-photo-input"
                    type="file"
                    accept="image/*"
                    data-pet-photo-input
                  />
                  <label class="upload-dropzone" for="pet-photo-input">
                    <div class="upload-empty" data-photo-empty>
                      <span class="upload-cta">选择照片</span>
                      <small>不上传也可以直接进行测试</small>
                    </div>
                    <div class="upload-filled" data-photo-preview hidden>
                      <img class="upload-preview-image" data-photo-preview-image alt="已上传的毛孩子照片预览" />
                      <div class="upload-filled-copy">
                        <strong>已上传照片</strong>
                        <p class="upload-preview-name" data-photo-preview-name></p>
                        <small>点击重新选择</small>
                      </div>
                    </div>
                  </label>
                </div>

                <div class="wizard-progress">
                  <div class="wizard-progress-top">
                    <p class="step-kicker" data-step-kicker>准备信息</p>
                    <p class="step-count" data-step-count>第 1 / 13 步</p>
                  </div>
                  <div class="progress-track" aria-hidden="true">
                    <div class="progress-fill" data-progress-fill></div>
                  </div>
                </div>

                <div class="wizard-content" data-step-content></div>

                <div class="wizard-actions">
                  <button class="button button-ghost" type="button" data-prev-step>上一题</button>
                  <button class="button button-primary" type="submit" data-next-step>开始答题</button>
                </div>
              </form>

              <section class="result-panel panel-card" data-result-panel hidden>
                <span class="eyebrow">测试结果</span>
                <div data-result-content></div>
                <div class="result-actions">
                  <button class="button button-primary" type="button" data-restart-quiz>
                    重新测试
                  </button>
                </div>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./assets/js/site.js"></script>
    <script type="module" src="./assets/js/quiz.js"></script>
  </body>
</html>
